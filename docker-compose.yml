services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/apps/api_backend/src/mensa_api_backend/.env
    environment:
      API_BACKEND_CANTEEN_INDEX_PATH: /data/canteens.json
    volumes:
      - canteen_data:/data
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        BASIC_AUTH_USER: ${BASIC_AUTH_USER}
        BASIC_AUTH_PASS: ${BASIC_AUTH_PASS}
    ports:
      - "80:80"
    depends_on:
      - backend

  portainer:
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    command: ["--base-url", "/portainer"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

volumes:
  portainer_data:
  canteen_data:
