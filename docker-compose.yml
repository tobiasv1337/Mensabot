services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/apps/api_backend/src/mensa_api_backend/.env
    environment:
      API_BACKEND_CANTEEN_INDEX_PATH: /data/canteens.json
    volumes:
      - canteen_data:/data
    expose:
      - "8000"
    depends_on:
      - ollama_tunnel

  ollama_tunnel:
    image: alpine:3.20
    network_mode: "service:backend"   # share network namespace with backend
    restart: unless-stopped
    environment:
    SSHPASS: ${OLLAMA_TUNNEL_PASSWORD}
    command: >
      sh -lc '
        apk add --no-cache openssh-client sshpass &&
        mkdir -p /root/.ssh &&
        touch /root/.ssh/known_hosts &&
        while true; do
          sshpass -e ssh -N
            -o ExitOnForwardFailure=yes
            -o ServerAliveInterval=30
            -o ServerAliveCountMax=3
            -o StrictHostKeyChecking=accept-new
            -o UserKnownHostsFile=/root/.ssh/known_hosts
            -o PubkeyAuthentication=no
            -o PreferredAuthentications=password
            -L 127.0.0.1:11434:127.0.0.1:11434
            ollama-tunnel@130.149.150.101;
          sleep 2;
        done
      '

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    expose:
      - "8080"
    depends_on:
      - backend

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        BASIC_AUTH_USER: ${BASIC_AUTH_USER}
        BASIC_AUTH_PASS: ${BASIC_AUTH_PASS}
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
      - portainer

  portainer:
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    command: ["--base-url", "/portainer"]
    expose:
      - "9000"
      - "9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

volumes:
  portainer_data:
  canteen_data:
