services:
  stt:
    build:
      context: .
      dockerfile: backend/apps/stt_server/Dockerfile
    env_file:
      - .env
    volumes:
      - stt_models:/models
    expose:
      - "9100"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      MENSA_MCP_CANTEEN_INDEX_PATH: /data/canteens.json
      MENSA_MCP_SHARED_CACHE_PATH: /data/shared-cache.json
    volumes:
      - backend_cache_data:/data
    expose:
      - "8000"
    depends_on:
      - stt

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_MAPTILER_STYLE_URL_LIGHT: ${VITE_MAPTILER_STYLE_URL_LIGHT}
        VITE_MAPTILER_STYLE_URL_DARK: ${VITE_MAPTILER_STYLE_URL_DARK}
    expose:
      - "8080"
    depends_on:
      - backend

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
      - portainer

  portainer:
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    command: ["--base-url", "/portainer"]
    expose:
      - "9000"
      - "9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

volumes:
  portainer_data:
  backend_cache_data:
  stt_models:
