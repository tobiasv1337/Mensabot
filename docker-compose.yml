services:
  stt:
    build:
      context: .
      dockerfile: backend/apps/stt_server/Dockerfile
    env_file:
      - .env
    volumes:
      - stt_models:/models
    expose:
      - "9100"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      MENSA_MCP_CANTEEN_INDEX_PATH: /data/canteens.json
      MENSA_MCP_SHARED_CACHE_PATH: /data/shared-cache.json
    volumes:
      - backend_cache_data:/data
    expose:
      - "8000"
    depends_on:
      - stt
      - ollama_tunnel

  ollama_tunnel:
    image: alpine:3.20
    restart: unless-stopped
    environment:
      SSHPASS: ${OLLAMA_TUNNEL_PASSWORD}
      TUNNEL_USER: ${OLLAMA_TUNNEL_USER}
      TUNNEL_HOST: ${OLLAMA_TUNNEL_HOST}
      TUNNEL_PORT: ${OLLAMA_TUNNEL_PORT:-11434}
    command: >
      sh -lc '
        apk add --no-cache openssh-client sshpass &&
        mkdir -p /root/.ssh &&
        touch /root/.ssh/known_hosts &&
        while true; do
          sshpass -e ssh -N \
            -o ExitOnForwardFailure=yes \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=3 \
            -o StrictHostKeyChecking=accept-new \
            -o UserKnownHostsFile=/root/.ssh/known_hosts \
            -o PubkeyAuthentication=no \
            -o PreferredAuthentications=password \
            -L 0.0.0.0:$${TUNNEL_PORT}:127.0.0.1:$${TUNNEL_PORT} \
            $${TUNNEL_USER}@$${TUNNEL_HOST};
          sleep 2;
        done
      '

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_MAPTILER_STYLE_URL_LIGHT: ${VITE_MAPTILER_STYLE_URL_LIGHT}
        VITE_MAPTILER_STYLE_URL_DARK: ${VITE_MAPTILER_STYLE_URL_DARK}
    expose:
      - "8080"
    depends_on:
      - backend

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
      - portainer

  portainer:
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    command: ["--base-url", "/portainer"]
    expose:
      - "9000"
      - "9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

volumes:
  portainer_data:
  backend_cache_data:
  stt_models:
