<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mensabot is offline</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f9fafb;
        color: #111827;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .card {
        max-width: 520px;
        padding: 32px;
        margin: 24px;
        border-radius: 16px;
        background: #ffffff;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        text-align: center;
      }
      .logo {
        width: 72px;
        height: 72px;
        margin: 0 auto 16px;
        display: block;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }
      p {
        margin: 0 0 8px;
        color: #4b5563;
      }
      .hint {
        margin-top: 16px;
        font-size: 14px;
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="logo" src="/mensabot-logo-gradient.svg" alt="Mensabot" />
      <h1>Mensabot is offline</h1>
      <p>You are not connected to the internet right now.</p>
      <p>Reconnect and try again.</p>
      <div class="hint">Your app is still installed and will work once you're back online.</div>
    </div>
  </body>
</html>
