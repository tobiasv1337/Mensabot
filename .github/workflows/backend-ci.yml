name: Backend CI

permissions:
  contents: read
  pull-requests: read

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development
  workflow_dispatch:

jobs:
  detect-backend-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Detect backend changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/backend-ci.yml'

  openmensa-sdk:
    needs: detect-backend-changes
    if: needs.detect-backend-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python 3.11 via uv
        run: uv python install 3.11

      - name: Sync OpenMensa SDK dependencies
        working-directory: backend/libs/openmensa
        run: uv sync --all-extras --dev

      - name: Compile OpenMensa SDK sources
        working-directory: backend/libs/openmensa
        run: uv run python -m compileall src

      - name: Run OpenMensa SDK tests (pytest, optional)
        working-directory: backend/libs/openmensa
        run: |
          if [ -d "tests" ]; then
            echo "Found tests directory, running pytest"
            uv run pytest
          else
            echo "No tests directory, skipping pytest"
          fi

  mcp-server:
    needs: [detect-backend-changes, openmensa-sdk]
    if: needs.detect-backend-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python 3.11 via uv
        run: uv python install 3.11

      - name: Sync MCP server dependencies
        working-directory: backend/apps/mcp-server
        run: uv sync --all-extras --dev

      - name: Compile MCP server sources
        working-directory: backend/apps/mcp-server
        run: uv run python -m compileall src

      - name: Run MCP server tests (pytest, optional)
        working-directory: backend/apps/mcp-server
        run: |
          if [ -d "tests" ]; then
            echo "Found tests directory, running pytest"
            uv run pytest
          else
            echo "No tests directory, skipping pytest"
          fi

  api-backend:
    needs: [detect-backend-changes, openmensa-sdk, mcp-server]
    if: needs.detect-backend-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    env:
      # secrets
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      # variables
      LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
      LLM_MODEL: ${{ vars.LLM_MODEL }}
      MCP_URL: ${{ vars.MCP_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python 3.11 via uv
        run: uv python install 3.11

      - name: Sync API backend dependencies
        working-directory: backend/apps/api_backend
        run: uv sync --all-extras --dev

      - name: Compile API backend sources
        working-directory: backend/apps/api_backend
        run: uv run python -m compileall src

      - name: Run API backend tests (pytest, optional)
        working-directory: backend/apps/api_backend
        run: |
          if [ -d "tests" ]; then
            echo "Found tests directory, running pytest"
            uv run pytest
          else
            echo "No tests directory, skipping pytest"
          fi

      - name: Start API backend for healthcheck
        working-directory: backend/apps/api_backend
        run: |
          uv run mensa-api-backend &
          echo "Waiting for API to start..."
          sleep 5

      - name: Healthcheck /api/health
        run: curl -f http://127.0.0.1:8000/api/health