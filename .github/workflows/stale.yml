name: Stale PRs and Issues

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # PRs
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-pr-label: "stale"
          close-pr-label: "closed-as-stale"
          stale-pr-message: >
            This pull request has been marked as stale due to inactivity.
            If you still want to continue it, please push an update or leave a comment.
          close-pr-message: >
            Closing this pull request because it has remained inactive after being marked stale.
            It can be reopened if work continues.
          remove-pr-stale-when-updated: true
          exempt-pr-labels: "do-not-close"

          # Issues
          days-before-issue-stale: 60
          days-before-issue-close: -1
          stale-issue-label: "stale"
          stale-issue-message: >
            This issue has been marked as stale due to inactivity.
            Please comment if it is still relevant.
          close-issue-message: >
            Closing this issue because it has remained inactive after being marked stale.
            It can be reopened if this issue is still relevant.
          remove-issue-stale-when-updated: true

          # Exemptions
          exempt-issue-labels: "bug,security,planned"